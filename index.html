<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviroware — Packing Slip Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1a3a1a;
      --green-mid:   #2d5a27;
      --green-light: #4a8c3f;
      --green-pale:  #e8f2e6;
      --green-tint:  #f4faf3;
      --ink:         #1a2418;
      --ink-mid:     #3d4f3a;
      --ink-light:   #6b7f67;
      --border:      #c8dcc4;
      --white:       #ffffff;
      --red:         #c0392b;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--green-tint);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--green-dark);
      padding: 18px 48px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 3px solid var(--green-light);
    }

    .logo-text {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 22px;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .logo-text span { color: var(--green-light); }

    .header-tag {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--green-light);
      background: rgba(74,140,63,0.15);
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid rgba(74,140,63,0.3);
    }

    /* ── Layout ── */
    main {
      max-width: 820px;
      margin: 48px auto;
      padding: 0 24px 80px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      color: var(--green-dark);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--ink-light);
      margin-bottom: 36px;
    }

    /* ── Card ── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(26,58,26,0.06);
    }

    .card-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--green-light);
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--green-pale);
    }

    /* ── Form ── */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .field-grid.single { grid-template-columns: 1fr; }
    .field-grid.thirds { grid-template-columns: 1fr 1fr 1fr; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.span2 { grid-column: span 2; }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-mid);
      letter-spacing: 0.2px;
    }

    input, textarea {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      background: var(--green-tint);
      border: 1.5px solid var(--border);
      border-radius: 7px;
      padding: 10px 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
      width: 100%;
    }
    input:focus, textarea:focus {
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(74,140,63,0.12);
      background: var(--white);
    }
    textarea { resize: vertical; min-height: 72px; }

    /* ── Ship To rows ── */
    #ship-to-fields { display: flex; flex-direction: column; gap: 8px; }
    .ship-row { display: flex; gap: 8px; align-items: center; }
    .ship-row input { flex: 1; }
    .remove-ship {
      background: none; border: none; cursor: pointer;
      color: var(--ink-light); font-size: 18px; line-height: 1;
      padding: 4px 6px; border-radius: 4px;
      transition: color 0.15s;
    }
    .remove-ship:hover { color: var(--red); }

    /* ── Line items table ── */
    .line-items-header {
      display: grid;
      grid-template-columns: 60px 110px 1fr 110px 36px;
      gap: 8px;
      margin-bottom: 6px;
    }
    .line-items-header span {
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-light);
      padding: 0 4px;
    }

    #line-items { display: flex; flex-direction: column; gap: 8px; }
    .line-row {
      display: grid;
      grid-template-columns: 60px 110px 1fr 110px 36px;
      gap: 8px;
      align-items: center;
    }
    .remove-line {
      background: none; border: none; cursor: pointer;
      color: var(--ink-light); font-size: 18px;
      padding: 4px 6px; border-radius: 4px;
      transition: color 0.15s;
    }
    .remove-line:hover { color: var(--red); }

    /* ── Buttons ── */
    .btn-add {
      margin-top: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--green-mid);
      background: var(--green-pale);
      border: 1.5px dashed var(--green-light);
      border-radius: 7px;
      padding: 9px 18px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-add:hover {
      background: #d4ecd0;
      border-color: var(--green-mid);
    }

    .btn-generate {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--white);
      background: var(--green-dark);
      border: none;
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }
    .btn-generate:hover { background: var(--green-mid); }
    .btn-generate:active { transform: scale(0.99); }
    .btn-generate:disabled {
      background: var(--ink-light);
      cursor: not-allowed;
    }

    /* ── Status ── */
    #status {
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 10px;
    }
    #status.success {
      display: flex;
      background: var(--green-pale);
      border: 1px solid var(--border);
      color: var(--green-mid);
    }
    #status.error {
      display: flex;
      background: #fdecea;
      border: 1px solid #f5c6c2;
      color: var(--red);
    }
    #status.loading {
      display: flex;
      background: #f0f4ff;
      border: 1px solid #c5d0f0;
      color: #3d5a8a;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo-text">enviro<span>ware</span></div>
  <span class="header-tag">Packing Slip Generator</span>
</header>

<main>
  <h1>Generate Packing Slip</h1>
  <p class="subtitle">Fill in the order details below to generate and download a PDF packing slip.</p>

  <!-- Invoice Details -->
  <div class="card">
    <div class="card-title">Invoice Details</div>
    <div class="field-grid">
      <div class="field">
        <label for="invoice_no">Invoice Number</label>
        <input type="text" id="invoice_no" placeholder="00000937">
      </div>
      <div class="field">
        <label for="po">Purchase Order</label>
        <input type="text" id="po" placeholder="FPON12737696">
      </div>
    </div>
  </div>

  <!-- Ship To -->
  <div class="card">
    <div class="card-title">Ship To</div>
    <div id="ship-to-fields">
      <div class="ship-row"><input type="text" placeholder="Company / Name" class="ship-input"></div>
      <div class="ship-row"><input type="text" placeholder="Street Address" class="ship-input"></div>
      <div class="ship-row"><input type="text" placeholder="City  Postcode" class="ship-input"></div>
    </div>
    <button class="btn-add" onclick="addShipRow()">+ Add line</button>
  </div>

  <!-- Sender Details -->
  <div class="card">
    <div class="card-title">Sender Details</div>
    <div class="field-grid">
      <div class="field">
        <label for="company_email">Email</label>
        <input type="text" id="company_email" value="orders@primetie.co.nz">
      </div>
      <div class="field">
        <label for="company_phone">Phone</label>
        <input type="text" id="company_phone" value="(07) 549-1716">
      </div>
      <div class="field">
        <label for="company_address1">Address Line 1</label>
        <input type="text" id="company_address1" value="93 Tetley Road,">
      </div>
      <div class="field">
        <label for="company_address2">Address Line 2</label>
        <input type="text" id="company_address2" value="Katikati">
      </div>
    </div>
  </div>

  <!-- Line Items -->
  <div class="card">
    <div class="card-title">Line Items</div>
    <div class="line-items-header">
      <span>QTY</span><span>SKU</span><span>Description</span><span>Unit Price</span><span></span>
    </div>
    <div id="line-items">
      <div class="line-row">
        <input type="text" placeholder="1" class="li-qty">
        <input type="text" placeholder="SKU-001" class="li-sku">
        <input type="text" placeholder="Product description" class="li-desc">
        <input type="text" placeholder="$0.00" class="li-price">
        <button class="remove-line" onclick="removeLine(this)" title="Remove">×</button>
      </div>
    </div>
    <button class="btn-add" onclick="addLineRow()">+ Add item</button>
  </div>

  <!-- Generate -->
  <button class="btn-generate" id="generateBtn" onclick="generate()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14,2 14,8 20,8"/>
      <line x1="12" y1="12" x2="12" y2="18"/>
      <line x1="9" y1="15" x2="15" y2="15"/>
    </svg>
    Generate & Download PDF
  </button>

  <div id="status"></div>
</main>

<script>
  function addShipRow() {
    const container = document.getElementById('ship-to-fields');
    const row = document.createElement('div');
    row.className = 'ship-row';
    row.innerHTML = `<input type="text" placeholder="Additional line" class="ship-input">
                     <button class="remove-ship" onclick="this.parentElement.remove()" title="Remove">×</button>`;
    container.appendChild(row);
    row.querySelector('input').focus();
  }

  function addLineRow() {
    const container = document.getElementById('line-items');
    const row = document.createElement('div');
    row.className = 'line-row';
    row.innerHTML = `
      <input type="text" placeholder="1" class="li-qty">
      <input type="text" placeholder="SKU-001" class="li-sku">
      <input type="text" placeholder="Product description" class="li-desc">
      <input type="text" placeholder="$0.00" class="li-price">
      <button class="remove-line" onclick="removeLine(this)" title="Remove">×</button>`;
    container.appendChild(row);
    row.querySelector('.li-qty').focus();
  }

  function removeLine(btn) {
    const rows = document.querySelectorAll('#line-items .line-row');
    if (rows.length > 1) btn.closest('.line-row').remove();
  }

  function setStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = type;
    if (type === 'loading') {
      el.innerHTML = `<div class="spinner"></div> ${msg}`;
    } else if (type === 'success') {
      el.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> ${msg}`;
    } else {
      el.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ${msg}`;
    }
  }

  async function generate() {
    const invoiceNo = document.getElementById('invoice_no').value.trim();
    const po        = document.getElementById('po').value.trim();

    const shipInputs = document.querySelectorAll('.ship-input');
    const shipTo = Array.from(shipInputs).map(i => i.value);

    const lineRows = document.querySelectorAll('#line-items .line-row');
    const lineItems = Array.from(lineRows).map(row => [
      row.querySelector('.li-qty').value.trim(),
      row.querySelector('.li-sku').value.trim(),
      row.querySelector('.li-desc').value.trim(),
      row.querySelector('.li-price').value.trim(),
    ]);

    if (!invoiceNo || !po) {
      setStatus('error', 'Invoice number and PO are required.');
      return;
    }
    if (lineItems.every(r => !r[2])) {
      setStatus('error', 'At least one line item is required.');
      return;
    }

    const payload = {
      invoice_no:       invoiceNo,
      po:               po,
      ship_to:          shipTo,
      company_email:    document.getElementById('company_email').value.trim(),
      company_phone:    document.getElementById('company_phone').value.trim(),
      company_address1: document.getElementById('company_address1').value.trim(),
      company_address2: document.getElementById('company_address2').value.trim(),
      line_items:       lineItems,
    };

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    setStatus('loading', 'Generating PDF…');

    try {
      const res = await fetch('/packing-slip', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Unknown error' }));
        throw new Error(err.error || `HTTP ${res.status}`);
      }

      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `PKS${invoiceNo}.pdf`;
      a.click();
      URL.revokeObjectURL(url);

      setStatus('success', `PKS${invoiceNo}.pdf downloaded successfully.`);
    } catch (e) {
      setStatus('error', `Failed to generate PDF: ${e.message}`);
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
